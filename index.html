<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belajar Pemrograman Web</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="main-container">
    <div class="form-container">
        <div class="body-container">
            <h1 class="header-text">
                Register
            </h1>
        </div>
        <div class="body-container input-parent-container">
            <span class="input-container">
                <h2 class="input-title">
                    Nama
                </h2>
                <input class="input-entry" type="text">
            </span>
            <span class="input-container">
                <h2 class="input-title">
                    Kata Sandi
                </h2>
                <input class="input-entry" type="password">
            </span>
        </div>
        <div class="body-container">
            <p class="login-hyperlink">
                Sudah punya akun? 
                <a id="option-hyperlink">
                    Login Disini
                </a>
            </p>
        </div>
        <div class="body-container button-container">
            <button class="form-button cencel-button">
                Cencel
            </button>
            <button class="form-button login-button">
                Register
            </button>
        </div>
    </div>
    <script src="./main.js"></script>
</body>
</html>
